  if(sft){h+=`<div class="ft"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:#60a5fa">🔍 過濾條件</span><button class="ft-btn" onclick="resetF()">清除全部</button></div><div class="ft-row"><span class="ft-lbl">CB價格</span><input class="ft-in" placeholder="最低" value="${F.cbMin||''}" onchange="F.cbMin=this.value?+this.value:null;pg=0;render()"> ~ <input class="ft-in" placeholder="最高" value="${F.cbMax||''}" onchange="F.cbMax=this.value?+this.value:null;pg=0;render()"></div><div class="ft-row"><span class="ft-lbl">溢價率 ≤</span><input class="ft-in" placeholder="例:10" value="${F.premMax||''}" onchange="F.premMax=this.value?+this.value:null;pg=0;render()"> %</div><div class="ft-row"><span class="ft-lbl">轉換價 ≤</span><input class="ft-in" placeholder="例:50" value="${F.cvMax||''}" onchange="F.cvMax=this.value?+this.value:null;pg=0;render()"></div><div class="ft-row"><span class="ft-lbl">殖利率 ≥</span><input class="ft-in" placeholder="例:3" value="${F.ypMin||''}" onchange="F.ypMin=this.value?+this.value:null;pg=0;render()"> %</div><div class="ft-row"><span class="ft-lbl">EPS ≥</span><input class="ft-in" placeholder="例:1" value="${F.epMin||''}" onchange="F.epMin=this.value?+this.value:null;pg=0;render()"></div><div class="ft-row"><span class="ft-lbl">已轉換 ≤</span><input class="ft-in" placeholder="例:10" value="${F.cpMax||''}" onchange="F.cpMax=this.value?+this.value:null;pg=0;render()"> %</div><div class="ft-row"><span class="ft-lbl">量比 ≥</span><input class="ft-in" placeholder="例:1.5" value="${F.vrMin||''}" onchange="F.vrMin=this.value?+this.value:null;pg=0;render()"> x</div><div class="ft-row"><span class="ft-lbl">天數</span><input class="ft-in" placeholder="最少" value="${F.dlMin||''}" onchange="F.dlMin=this.value?+this.value:null;pg=0;render()"> ~ <input class="ft-in" placeholder="最多" value="${F.dlMax||''}" onchange="F.dlMax=this.value?+this.value:null;pg=0;render()"> 天</div><div class="ft-row"><span class="ft-lbl">總分 ≥</span><input class="ft-in" placeholder="例:5" value="${F.scoreMin||''}" onchange="F.scoreMin=this.value?+this.value:null;pg=0;render()"></div><div class="ft-row"><span class="ft-lbl">事件</span><label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" ${F.hasNews?'checked':''} onchange="F.hasNews=this.checked;pg=0;render()"><span style="font-size:11px;color:#fbbf24">今日新📢</span></label><label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:8px"><input type="checkbox" ${F.hasConf?'checked':''} onchange="F.hasConf=this.checked;pg=0;render()"><span style="font-size:11px;color:#60a5fa">有📅法說會</span></label></div></div>`}
  if(swt){h+=`<div class="ft"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700;color:#fbbf24">⚙ 權重</span><span style="font-size:10px;color:${tw===100?'#34d399':'#fb923c'};font-family:monospace">${tw}%</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1px 10px">${SK.map((k,i)=>`<div style="margin-bottom:3px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:#d1d9e6">${SN[i]}</span><span style="font-size:10px;color:#60a5fa;font-family:monospace">${W[k]}%</span></div><input type="range" min="0" max="30" value="${W[k]}" onchange="W.${k}=+this.value;render()" style="width:100%;accent-color:#3b82f6;height:3px"></div>`).join("")}</div></div>`}
  h+=`<div style="border:1px solid #1c2e45;border-radius:8px;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr style="background:#0b1322">`;
  [{k:null,l:"#"},{k:"name",l:"CB名稱"},{k:"total",l:"總分",a:"center"},{k:"cb",l:"CB價",a:"right"},{k:"prem",l:"溢價率",a:"right"},{k:"yp",l:"殖利率",a:"right"},{k:"cp",l:"已轉換",a:"right"},{k:"vr",l:"量比",a:"right"},{k:"dc",l:"漲跌",a:"right"},{k:"dl",l:"天數",a:"right"},{k:null,l:"評分",a:"center"},{k:null,l:"事件",a:"center"}].forEach(col=>{const ic=sk===col.k?"#60a5fa":"#3e5068",ar=col.k?(sk===col.k?(sa?"↑":"↓"):"⇅"):"";h+=`<th ${col.k?`onclick="ds('${col.k}')"`:""}style="text-align:${col.a||'left'}">${col.l}<span style="font-size:7px;color:${ic}"> ${ar}</span></th>`});
  h+=`</tr></thead><tbody>`;
  pd.forEach((it,idx)=>{
    const rank=pg*PS+idx+1,rc=rank<=3?["#fbbf24","#94a3b8","#cd7c2a"][rank-1]:"#3e5068",tc=c(it.tt);
    const yp=it.yp!=null?it.yp.toFixed(1)+"%":"-",yc=it.yp>=4?"#34d399":it.yp>=2?"#fbbf24":"#546580";
    const cp=it.cp!=null?it.cp.toFixed(1)+"%":"-",cc=it.cp!=null&&it.cp<=5?"#34d399":it.cp!=null&&it.cp<=30?"#fbbf24":"#546580";
    const cbp=it.cb!=null?it.cb.toFixed(1):"-",cbc=it.cb!=null&&it.cb<100?"#34d399":it.cb!=null&&it.cb<120?"#fbbf24":"#546580";
    const vr=it.vr!=null?it.vr.toFixed(1)+"x":"-",vc=it.vr>=2?"#34d399":it.vr>=1?"#fbbf24":"#546580";
    const dc=it.dc!=null?(it.dc>=0?"+":"")+it.dc.toFixed(1)+"%":"-",dcc=it.dc!=null?(it.dc>=3?"#34d399":it.dc>=0?"#fbbf24":"#f87171"):"#546580";
    const pm=it.prem!=null?(it.prem>=0?"+":"")+it.prem.toFixed(1)+"%":"-",pmc=it.prem!=null?(it.prem<=-10?"#34d399":it.prem<=0?"#6ee7b7":it.prem<=10?"#fbbf24":"#f87171"):"#546580";
    let mini="";SK.forEach(k=>{const v=it.s[k]||0;mini+=`<div class="mb2"><div class="mf" style="height:${v*10}%;background:${c(v)}"></div></div>`});
    let ev=[];
    if(it.hc)ev.push('<span style="font-size:8px;background:rgba(59,130,246,.15);color:#60a5fa;padding:1px 3px;border-radius:2px">📅</span>');
    if(it.nn===1)ev.push('<span style="font-size:8px;background:rgba(245,158,11,.15);color:#fbbf24;padding:1px 3px;border-radius:2px;font-weight:700">📢</span>');
    else if(it.nc>0)ev.push(`<span style="font-size:8px;color:#546580">${it.nc}則</span>`);
    const evCell=ev.length?ev.join(' '):'<span style="color:#1c2e45">—</span>';
    h+=`<tr class="r" onclick="sd(${idx})" style="cursor:pointer"><td style="text-align:center;font-size:9px;font-weight:700;font-family:monospace;color:${rc}">${rank}</td><td><div style="font-weight:700;color:#e8ecf2;font-size:11px">${it.n}</div><div style="font-size:9px;color:#3e5068">${it.sn}(${it.k}) ${it.se}</div></td><td style="text-align:center"><span class="b" style="color:${tc}">${it.tt.toFixed(1)}</span></td><td style="text-align:right;font-family:monospace;font-size:11px;color:${cbc}">${cbp}</td><td style="text-align:right;font-family:monospace;font-size:11px;color:${pmc}">${pm}</td><td style="text-align:right;font-family:monospace;font-size:11px;color:${yc}">${yp}</td><td style="text-align:right;font-family:monospace;font-size:11px;color:${cc}">${cp}</td><td style="text-align:right;font-family:monospace;font-size:11px;color:${vc}">${vr}</td><td style="text-align:right;font-family:monospace;font-size:11px;color:${dcc}">${dc}</td><td style="text-align:right;font-family:monospace;font-size:10px;color:#546580">${it.dl!=null?it.dl:"-"}</td><td style="text-align:center"><div style="display:flex;gap:1px;justify-content:center;align-items:flex-end;height:16px">${mini}</div></td><td style="text-align:center">${evCell}</td></tr>`});
  h+=`</tbody></table></div></div>`;
  if(tp>1) h+=`<div style="display:flex;justify-content:center;gap:4px;margin-top:8px;align-items:center"><button class="ft-btn" onclick="pg=Math.max(0,pg-1);render()">‹</button><span style="font-size:10px;color:#546580">${pg+1}/${tp}</span><button class="ft-btn" onclick="pg=Math.min(${tp}-1,pg+1);render()">›</button></div>`;
  h+=`<div style="margin-top:6px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">${[["≥8","#34d399"],["≥6","#fbbf24"],["≥4","#fb923c"],["<4","#f87171"]].map(([l,cl])=>`<div style="display:flex;align-items:center;gap:2px;font-size:9px;color:#3e5068"><div style="width:5px;height:5px;border-radius:1px;background:${cl}"></div>${l}</div>`).join("")}<div style="font-size:9px;color:#3e5068"><span style="color:#60a5fa">📅</span>=法說會 <span style="color:#fbbf24">📢</span>=新訊息</div></div>`;
  document.getElementById("app").innerHTML=h;
  document.getElementById("sb").oninput=function(){q=this.value;pg=0;render()};
  document.getElementById("ss").onchange=function(){sf=this.value;pg=0;render()};
  window._pd=pd}
function resetF(){F={cbMax:null,cbMin:null,cvMax:null,dlMin:null,dlMax:null,ypMin:null,cpMax:null,epMin:null,scoreMin:null,hasNews:false,vrMin:null,premMax:null,hasConf:false};pg=0;render()}
function ds(k){if(sk===k)sa=!sa;else{sk=k;sa=(k==="cp"||k==="cb"||k==="prem")}pg=0;render()}

function sd(idx){
  const it=window._pd[idx];if(!it)return;
  const t=it.tt,tc=c(t);
  const dy=it.yp!=null?it.yp.toFixed(2)+"%":"—";
  const ipe=it.ep&&it.cv?(it.cv/it.ep).toFixed(1):null;
  const pp=ipe&&it.pl!=null&&it.ph&&it.ph!==it.pl?Math.min(100,Math.max(0,((parseFloat(ipe)-it.pl)/(it.ph-it.pl))*100)):null;
  const vr=it.vr!=null?it.vr.toFixed(2)+"x":"—";
  const dc=it.dc!=null?(it.dc>=0?"+":"")+it.dc.toFixed(2)+"%":"—";
  const dcc=it.dc!=null?(it.dc>=3?"#34d399":it.dc>=0?"#fbbf24":"#f87171"):"#546580";
  const pm=it.prem!=null?(it.prem>=0?"+":"")+it.prem.toFixed(2)+"%":"—";
  const pmc=it.prem!=null?(it.prem<=-10?"#34d399":it.prem<=0?"#6ee7b7":it.prem<=10?"#fbbf24":"#f87171"):"#546580";

  let h=`<div class="ov" onclick="cd()"><div class="md" onclick="event.stopPropagation()">`;

  // ── 標題列 ──
  h+=`<div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><h2 style="font-size:19px;font-weight:800;color:#f1f5f9">${it.n}</h2><span style="font-size:11px;color:#546580">${it.id} ｜ ${it.sn} (${it.k}) ｜ ${it.se}</span></div><span class="b" style="color:${tc};font-size:20px">${t.toFixed(1)}</span></div>`;

  // ── 9 宮格基本數據 ──
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px">${[["CB價格",it.cb!=null?"$"+it.cb:"—"],["轉換價",it.cv?"$"+it.cv:"-"],["現股價",it.sp?"$"+it.sp:"-"],["溢價率","<span style='color:"+pmc+"'>"+pm+"</span>"],["EPS(4Q)",it.ep!=null?"$"+it.ep:"—"],["已轉換",it.cp!=null?it.cp.toFixed(1)+"%":"—"],["量比",vr],["漲跌幅","<span style='color:"+dcc+"'>"+dc+"</span>"],["剩餘天數",it.dl!=null?it.dl+"天":"-"]].map(([l,v])=>`<div class="cd"><div style="font-size:9px;color:#546580">${l}</div><div style="font-size:12px;font-weight:700;color:${v==="—"?"#334155":"#e2e8f0"};font-family:monospace">${v}</div></div>`).join("")}</div>`;

  // ── 殖利率 / 發行PE / PE位置 ──
  if(dy!=="—"||ipe){h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px"><div class="ic" style="background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.12)"><div style="font-size:9px;color:#60a5fa">殖利率</div><div style="font-size:12px;font-weight:700;color:#93c5fd;font-family:monospace">${dy}</div>${it.dv!=null?`<div style="font-size:9px;color:#3e5068">股利 $${it.dv}</div>`:""}</div><div class="ic" style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12)"><div style="font-size:9px;color:#fbbf24">發行PE</div><div style="font-size:12px;font-weight:700;color:#fcd34d;font-family:monospace">${ipe?ipe+"x":"—"}</div>${it.pl!=null?`<div style="font-size:9px;color:#3e5068">${it.pl}-${it.ph}x</div>`:""}</div><div class="ic" style="background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.12)"><div style="font-size:9px;color:#a855f7">PE位置</div><div style="font-size:12px;font-weight:700;color:#c084fc;font-family:monospace">${pp!=null?pp.toFixed(0)+"%":"—"}</div><div style="font-size:9px;color:#3e5068">${pp!=null?(pp<40?"偏低估":pp<60?"中間":"偏高估"):"—"}</div></div></div>`}

  // ── PE 區間圖 ──
  if(pp!=null){h+=`<div style="margin-bottom:12px;padding:8px 10px;background:#131d2b;border-radius:8px"><div style="font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:6px">本益比區間</div><div class="pb"><div style="position:absolute;left:-20px;top:50%;transform:translateY(-50%);font-size:8px;color:#546580">${it.pl}x</div><div style="position:absolute;right:-20px;top:50%;transform:translateY(-50%);font-size:8px;color:#546580">${it.ph}x</div><div class="dot" style="left:${Math.min(Math.max(pp,0),100)}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:5px;font-size:8px;color:#3e5068;padding:0 20px"><span>←低估(10)</span><span>高估(1)→</span></div></div>`}

  // ── 各項評分 ──
  h+=`<div style="font-size:10px;font-weight:700;color:#7a8ba3;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #1c2e45">各項評分</div>`;
  SK.forEach((k,i)=>{const v=it.s[k]||0;const cl=c(v);h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(28,46,69,.3)"><span style="font-size:11px;color:#cbd5e1">${SN[i]}</span><div style="display:flex;align-items:center;gap:4px"><div class="bg"><div class="fg" style="width:${v*10}%;background:${cl}"></div></div><span style="font-size:11px;font-weight:700;color:${cl};font-family:monospace">${v}</span></div></div>`});

  // ══════════════════════════════════════
  // Section A：法說會資訊（前瞻催化劑）
  // ══════════════════════════════════════
  h+=`<div class="sec" style="margin-top:14px;border-color:${it.hc?'rgba(59,130,246,.3)':'#1c2e45'}">`;
  h+=`<div class="sec-h" style="background:${it.hc?'rgba(59,130,246,.08)':'#0b1322'};color:${it.hc?'#60a5fa':'#3e5068'}"><span style="font-size:14px">📅</span>法說會資訊</div>`;
  h+=`<div class="sec-b">`;
  if(it.hc && it.cd){
    h+=`<div style="display:flex;align-items:center;gap:10px">`;
    h+=`<div style="width:50px;height:50px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:8px;color:#60a5fa;font-weight:700">${it.cd.split('/')[1]||''}月</span><span style="font-size:18px;font-weight:900;color:#93c5fd;line-height:1">${it.cd.split('/')[2]||''}</span></div>`;
    h+=`<div><div style="font-size:13px;font-weight:700;color:#93c5fd">即將舉辦法說會</div><div style="font-size:11px;color:#60a5fa;font-family:monospace;margin-top:2px">${it.cd}</div><div style="font-size:10px;color:#3e5068;margin-top:2px">留意法說會前後股價波動</div></div>`;
    h+=`</div>`;
  } else {
    h+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0"><span style="font-size:11px;color:#334155">無近期法說會</span></div>`;
  }
  h+=`</div></div>`;

  // ══════════════════════════════════════
  // Section B：重大訊息（過去事件回顧）
  // ══════════════════════════════════════
  h+=`<div class="sec" style="border-color:${it.nn?'rgba(245,158,11,.25)':'#1c2e45'}">`;
  h+=`<div class="sec-h" style="background:${it.nn?'rgba(245,158,11,.06)':'#0b1322'};color:${it.nn?'#fbbf24':'#3e5068'}"><span style="font-size:14px">📢</span>重大訊息`;
  if(it.nc>0) h+=`<span style="font-size:10px;color:#546580;font-weight:400;margin-left:4px">(近30天 ${it.nc} 則)</span>`;
  if(it.nn) h+=`<span style="font-size:9px;background:rgba(245,158,11,.15);color:#fbbf24;padding:1px 5px;border-radius:3px;margin-left:auto">🆕 有新消息</span>`;
  h+=`</div>`;
  h+=`<div class="sec-b" style="padding:0">`;
  if(it.nw && it.nw.length>0){
    it.nw.forEach(n=>{
      h+=`<div class="nw"><span class="nw-d">${n[0]}</span><span class="nw-t">${n[1]}</span></div>`;
    });
    if(it.nc > it.nw.length){
      h+=`<div style="font-size:10px;color:#3e5068;text-align:center;padding:6px;border-top:1px solid rgba(28,46,69,.3)">還有 ${it.nc-it.nw.length} 則更早的訊息...</div>`;
    }
  } else {
    h+=`<div style="padding:10px;font-size:11px;color:#334155">近 30 天無重大訊息</div>`;
  }
  h+=`</div></div>`;

  // ── 關閉按鈕 ──
  h+=`<button onclick="cd()" style="margin-top:10px;width:100%;padding:7px;background:#1c2e45;color:#93c5fd;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">關閉</button>`;
  h+=`</div></div>`;
  document.getElementById("dl").innerHTML=h}

function cd(){document.getElementById("dl").innerHTML=""}
render();
</script>
</body>
</html>
