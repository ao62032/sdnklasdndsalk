  h+=`</div></div>`;

  h+=`<div class="sec" style="border-color:${it.nn?'rgba(245,158,11,.25)':'#1c2e45'}"><div class="sec-h" style="background:${it.nn?'rgba(245,158,11,.06)':'#0b1322'};color:${it.nn?'#fbbf24':'#3e5068'}"><span style="font-size:15px">📢</span>重大訊息`;
  if(it.nc>0)h+=`<span style="font-size:11px;color:#546580;font-weight:400;margin-left:4px">(${it.nc}則)</span>`;
  if(it.nn)h+=`<span style="font-size:10px;background:rgba(245,158,11,.15);color:#fbbf24;padding:2px 6px;border-radius:3px;margin-left:auto">🆕</span>`;
  h+=`</div><div class="sec-b" style="padding:0">`;
  if(it.nw&&it.nw.length>0){it.nw.forEach(n=>{h+=`<div class="nw"><span class="nw-d">${n[0]}</span><span class="nw-t">${n[1]}</span></div>`});if(it.nc>it.nw.length)h+=`<div style="font-size:11px;color:#3e5068;text-align:center;padding:7px;border-top:1px solid rgba(28,46,69,.3)">還有 ${it.nc-it.nw.length} 則更早的訊息</div>`}else{h+=`<div style="padding:12px;font-size:12px;color:#334155">近 30 天無重大訊息</div>`}
  h+=`</div></div>`;

  h+=`<button onclick="cd()" style="margin-top:12px;width:100%;padding:8px;background:#1c2e45;color:#93c5fd;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer">關閉</button></div></div>`;
  document.getElementById("dl").innerHTML=h}
function cd(){document.getElementById("dl").innerHTML=""}
render();
</script>
</body>
</html>
